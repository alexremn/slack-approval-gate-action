name: slack-approval-gate
description: |
  Gate a GitHub Actions workflow on Slack approval (threaded or standalone).
  Requires a Slack app with Socket Mode enabled and an App-Level token (xapp-).
author: Aleksandr Remniov <alexremn>
runs:
  using: node24
  main: dist/index.js
branding:
  icon: check-circle
  color: orange

inputs:
  channel-id:
    description: Slack channel ID. Falls back to env SLACK_CHANNEL_ID.
    required: false
  base-message-ts:
    description: If set, run in threaded mode under this message. No main message is posted or updated.
    required: false
  base-message-payload:
    description: Standalone mode only. JSON payload for the main message. Defaults to a GitHub-context block.
    required: false
    default: "{}"
  approvers:
    description: Comma-separated Slack user IDs allowed to approve.
    required: true
  minimum-approval-count:
    description: Number of approvals required.
    required: false
    default: "1"
  success-message-payload:
    description: JSON payload that replaces the approval reply on full approval.
    required: false
    default: "{}"
  fail-message-payload:
    description: JSON payload that replaces the approval reply on reject/cancel/timeout.
    required: false
    default: "{}"
  timeout-minutes:
    description: |
      Approval timeout. Action fails (outcome=timed-out) after this many minutes.
      This is independent of the step-level `timeout-minutes:` in your workflow —
      whichever fires first wins. Set both to the same value for clarity.
    required: false
    default: "30"
  minimum-reject-count:
    description: Number of rejections required before the action exits as rejected.
    required: false
    default: "1"
  prevent-self-approval:
    description: |
      If "true", the GitHub actor who triggered the run cannot approve when their
      Slack user id appears in `approvers`. Requires explicit Slack id mapping via
      `self-approval-slack-id` input.
    required: false
    default: "false"
  self-approval-slack-id:
    description: Slack user id of the GitHub actor (for prevent-self-approval check).
    required: false
    default: ""

outputs:
  main-message-ts:
    description: Timestamp of the main message (input ts in threaded mode).
  approval-message-ts:
    description: |
      Timestamp of the message that carries the buttons and gets updated.
      Equals main-message-ts in standalone mode; the thread reply ts in threaded mode.
  result:
    description: One of approved, rejected, canceled, timed-out.
  approvers-json:
    description: JSON array of Slack user IDs who approved.
  approvals-json:
    description: |
      JSON array of approval records: [{"user":"U123","ts":1700000000000}, ...].
      `ts` is epoch milliseconds at the moment of approval.
